name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_ENVIRONMENT: testing
      APP_DATA_DIR: ${{ github.workspace }}/data
      SECURITY_SECRET_KEY: test-secret-key-for-ci-contracts-1234567890
      MONITORING_METRICS_ENABLED: "false"
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: true
          cache-suffix: ci
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.6.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: |
          uv sync --extra dev --extra test --frozen
          pnpm install --frozen-lockfile
      - name: Check AI regression diff
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          guardrail_script="${RUNNER_TEMP}/regression_check.py"
          if git show "origin/${{ github.base_ref }}:scripts/ai/regression_check.py" > "${guardrail_script}" \
            && REGRESSION_CHECK_PROJECT_ROOT="${GITHUB_WORKSPACE}" uv run python "${guardrail_script}" --help | grep -q -- "--base-ref"; then
            REGRESSION_CHECK_PROJECT_ROOT="${GITHUB_WORKSPACE}" uv run python "${guardrail_script}" \
              --base-ref origin/${{ github.base_ref }} \
              --head-ref HEAD \
              --skip-file-count
          else
            uv run python scripts/ai/regression_check.py \
              --base-ref origin/${{ github.base_ref }} \
              --head-ref HEAD \
              --skip-file-count
          fi
      - name: Validate SSOT and OpenSpec
        run: |
          uv run python scripts/qa/check_ssot.py
          uv run python scripts/qa/check_repo_hygiene.py
          uv run python scripts/qa/check_file_sizes.py
          pnpm spec:validate
      - name: Validate backend
        run: |
          uv run ruff format --check src tests scripts
          uv run ruff check src tests scripts
          uv run bandit -r src
          uv run mypy src tests
          uv run lint-imports
          uv run coverage run -m pytest -q
          uv run coverage report --fail-under=88
          uv run python scripts/qa/check_openapi_snapshot.py
      - name: Validate frontend
        working-directory: frontend
        run: |
          pnpm lint
          pnpm format:check
          pnpm type-check
          pnpm test:unit
          pnpm build
      - name: Validate React static diagnostics
        working-directory: frontend
        run: |
          react_doctor_report="${RUNNER_TEMP}/react-doctor.json"
          pnpm dlx react-doctor@0.7.1 --json > "${react_doctor_report}"
          node - "${react_doctor_report}" <<'NODE'
          const fs = require("node:fs");
          const report = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const summary = report.summary ?? report.projects?.[0]?.summary;
          if (!summary) {
            console.error("React Doctor report did not include a summary.");
            process.exit(1);
          }
          if (summary.totalDiagnosticCount !== 0) {
            console.error(
              `React Doctor found ${summary.totalDiagnosticCount} diagnostics.`,
            );
            const diagnostics = report.diagnostics?.length
              ? report.diagnostics
              : (report.projects ?? []).flatMap(
                  (project) => project.diagnostics ?? [],
                );
            console.error(JSON.stringify(diagnostics, null, 2));
            process.exit(1);
          }
          console.log(
            `React Doctor clean: score ${summary.score} (${summary.scoreLabel})`,
          );
          NODE
      - name: Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Validate Studio workflow
        working-directory: frontend
        run: pnpm test:e2e:smoke
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: studio-browser-diagnostics
          path: |
            frontend/playwright-report/**
            frontend/test-results/**
          if-no-files-found: ignore

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: docker build -t novel-studio:ci .
      - name: Verify fresh install, persistence, restart, and deep link
        run: |
          set -euo pipefail
          trap 'docker rm -f novel-studio >/dev/null 2>&1 || true; docker volume rm novel-studio-ci >/dev/null 2>&1 || true' EXIT
          docker volume create novel-studio-ci
          docker run -d --name novel-studio -p 8000:8000 \
            -e SECURITY_SECRET_KEY=container-test-secret-key-1234567890 \
            -e SECURITY_CORS_ORIGINS=https://app.example.com \
            -v novel-studio-ci:/app/data \
            novel-studio:ci
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:8000/health/ready && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health/ready
          curl -fsS http://127.0.0.1:8000/projects/demo/history | grep -q '<title>Novel Studio</title>'
          curl -fsS -H 'Content-Type: application/json' \
            -d '{"username":"owner","password":"container-owner-password"}' \
            http://127.0.0.1:8000/api/setup
          curl -fsS -c cookies.txt -H 'Content-Type: application/json' \
            -d '{"username":"owner","password":"container-owner-password"}' \
            http://127.0.0.1:8000/api/session/login
          docker restart novel-studio
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:8000/health/ready && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health/ready
          curl -fsS -b cookies.txt http://127.0.0.1:8000/api/session | grep -q '"kind":"owner"'
          docker exec novel-studio uv run python -c "import sqlite3; from alembic.config import Config; from alembic.script import ScriptDirectory; connection=sqlite3.connect('/app/data/novel-engine.sqlite3'); expected=ScriptDirectory.from_config(Config('/app/alembic.ini')).get_current_head(); actual=connection.execute('SELECT version_num FROM alembic_version').fetchone()[0]; assert connection.execute('PRAGMA quick_check').fetchone() == ('ok',); assert actual == expected, (actual, expected)"
